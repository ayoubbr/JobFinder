<header class="main-header">
    <div class="container header-container">
        <div class="logo">
            <a routerLink="" class="logo-text">JobFinder<span class="dot">.</span></a>
        </div>

        <nav class="nav-links">
            <a routerLink="" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
            <a routerLink="jobs" routerLinkActive="active">Jobs</a>
            @if (userService.isAuthenticated()) {
            <a routerLink="favorites" routerLinkActive="active">Favorites</a>
            <a routerLink="applications" routerLinkActive="active">Applications</a>
            <a routerLink="profile" routerLinkActive="active">Profile</a>
            }
        </nav>

        <div class="auth-buttons">
            @if (!userService.isAuthenticated()) {
            <a routerLink="login" class="btn btn-outline btn-sm">Login</a>
            <a routerLink="register" class="btn btn-primary btn-sm">Sign Up</a>
            } @else {
            <button type="button" class="btn btn-outline btn-sm" (click)="logout()">Logout</button>
            }
        </div>
    </div>
</header>
